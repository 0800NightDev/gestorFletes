name: Build Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite ejecutar el workflow manualmente desde GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Usamos una versión estable de Python

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        # Empaquetamos en un solo archivo ejecutable (.exe), sin consola negra detrás (--noconsole)
        # Añadimos la carpeta views y database/schema.sql si es necesario
        pyinstaller --noconfirm --onedir --windowed --add-data "views;views/" --add-data "database;database/" main.py

    - name: Upload Windows Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MonitoreoFlota_Windows
        path: dist/main
